<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逻辑链条蓝图编辑器</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>
<div class="app-container">

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="toolbar-section">
            <button class="btn btn-primary" id="addNodeBtn">
                <i class="fas fa-plus"></i> 添加节点
            </button>
            <button class="btn btn-ai" id="addAiNodeBtn">
                <i class="fas fa-robot"></i> AI节点
            </button>
            <button class="btn btn-note" id="addNoteBtn" title="添加空白笔记节点（支持 Markdown）">
                <i class="fas fa-sticky-note"></i> 笔记
            </button>
        </div>
        <div class="toolbar-section">
            <input type="text" id="textInput" placeholder="粘贴或输入文本，自动转化为逻辑链..." class="text-input">
        </div>
        <div class="toolbar-section">
            <!-- 模型选择 -->
            <select class="model-select" id="modelSelect">
                <option value="local">📝 本地拆分</option>
                <optgroup label="── OpenAI ──">
                    <option value="openai_gpt4o">GPT-4o</option>
                    <option value="openai_gpt4o_mini">GPT-4o mini</option>
                </optgroup>
                <optgroup label="── 通义千问 ──">
                    <option value="qwen_plus">Qwen-Plus</option>
                    <option value="qwen_turbo">Qwen-Turbo</option>
                    <option value="qwen_max">Qwen-Max</option>
                </optgroup>
                <optgroup label="── Google Gemini ──">
                    <option value="gemini_2_flash">Gemini 2.0 Flash</option>
                    <option value="gemini_1_5_pro">Gemini 1.5 Pro</option>
                    <option value="gemini_1_5_flash">Gemini 1.5 Flash</option>
                </optgroup>
            </select>
            <!-- API Key（本地模式隐藏） -->
            <input type="password" id="globalApiKey" class="api-key-input" placeholder="粘贴 API Key...">
            <button class="btn btn-warning" id="autoGenerateBtn">
                <i class="fas fa-magic"></i> 自动转化
            </button>
        </div>
        <div class="toolbar-section" style="margin-left:auto">
            <!-- 颜色自定义 -->
            <button class="btn btn-secondary" id="colorPaletteBtn" title="自定义画布和节点颜色">
                <i class="fas fa-palette"></i> 配色
            </button>
            <button class="btn btn-info" id="saveBtn">
                <i class="fas fa-save"></i> 保存
            </button>
            <button class="btn btn-success" id="openBtn">
                <i class="fas fa-folder-open"></i> 打开
            </button>
            <!-- 隐藏的文件选择器 -->
            <input type="file" id="openFileInput" accept=".json" style="display:none">
            <button class="btn btn-danger" id="clearBtn">
                <i class="fas fa-trash"></i> 清空
            </button>
        </div>
    </div>

    <!-- 画布区域 -->
    <div class="canvas-container" id="canvasContainer">

        <!-- SVG 层：连接线（置底） -->
        <svg id="svgLayer" style="
            position:absolute; top:0; left:0;
            width:100%; height:100%;
            pointer-events:none; overflow:visible; z-index:1;">
            <defs>
                <!-- 默认箭头：深灰 -->
                <marker id="arrow" markerWidth="10" markerHeight="7"
                        refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
                </marker>
                <!-- 拖拽预览箭头：蓝色 -->
                <marker id="arrowTemp" markerWidth="10" markerHeight="7"
                        refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
                </marker>
                <!-- Hover/选中箭头：蓝色 -->
                <marker id="arrowHover" markerWidth="10" markerHeight="7"
                        refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
                </marker>
            </defs>
            <g id="svgGroup"></g>
        </svg>

        <!-- HTML 层：节点（置顶） -->
        <div id="nodeLayer" style="
            position:absolute; top:0; left:0;
            width:0; height:0;
            pointer-events:none; z-index:2;">
        </div>

        <!-- 缩放控制 -->
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomOutBtn">−</button>
            <span class="zoom-display" id="zoomDisplay">100%</span>
            <button class="zoom-btn" id="zoomInBtn">+</button>
            <input type="range" class="zoom-slider" id="zoomSlider"
                   min="20" max="200" value="100" step="5">
        </div>
    </div>

    <!-- 节点编辑弹窗 -->
    <div class="modal" id="nodeEditModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> 编辑节点</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="nodeTitleInput" placeholder="节点标题">
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea id="nodeContentInput" placeholder="节点详细内容" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>宽度 <span id="widthValue">200px</span></label>
                    <input type="range" id="nodeWidthSlider" min="140" max="480" value="200">
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="nodeCompletedCheckbox">
                        标记为已完成
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveNodeBtn">保存</button>
                <button class="btn btn-danger" id="deleteNodeBtn">删除节点</button>
            </div>
        </div>
    </div>

    <!-- AI 节点编辑弹窗 -->
    <div class="modal" id="aiNodeEditModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-robot"></i> AI处理节点</h3>
                <button class="close-btn" id="closeAiModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="aiNodeTitleInput" placeholder="节点标题">
                </div>
                <div class="form-group">
                    <label>提示词</label>
                    <textarea id="aiPromptInput" placeholder="输入AI处理的提示词..." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>输入数据</label>
                    <textarea id="aiInputData" placeholder="要处理的文本内容..." rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>API 密钥</label>
                    <input type="password" id="aiApiKey" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label>API 端点</label>
                    <input type="text" id="aiApiEndpoint" placeholder="https://api.openai.com/v1/chat/completions">
                </div>
                <div class="form-group">
                    <button class="btn btn-warning" id="processAiBtn" style="width:100%">
                        <i class="fas fa-bolt"></i> 执行处理
                    </button>
                </div>
                <div class="form-group">
                    <label>处理结果</label>
                    <div id="aiResult" class="ai-result">（点击"执行处理"后显示结果）</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveAiNodeBtn">保存</button>
                <button class="btn btn-danger" id="deleteAiNodeBtn">删除节点</button>
            </div>
        </div>
    </div>

    <!-- 富文本浮动工具栏 -->
    <div id="richToolbar" class="rich-toolbar" style="display:none;">
        <button class="rt-btn" data-cmd="bold"          title="加粗 (Ctrl+B)"><b>B</b></button>
        <button class="rt-btn" data-cmd="italic"        title="斜体 (Ctrl+I)"><i>I</i></button>
        <button class="rt-btn" data-cmd="underline"     title="下划线 (Ctrl+U)"><u>U</u></button>
        <button class="rt-btn" data-cmd="strikeThrough" title="删除线"><s>S</s></button>
        <div class="rt-divider"></div>
        <label class="rt-btn rt-color-btn" title="文字颜色">
            <span class="rt-color-icon">A</span>
            <input type="color" id="richColorPicker" value="#f38ba8" tabindex="-1">
        </label>
        <div class="rt-divider"></div>
        <button class="rt-btn" data-cmd="removeFormat"  title="清除格式">✕</button>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading" id="loadingIndicator">
        <div class="spinner"></div>
        <span>AI 处理中...</span>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
